parameters:
  - name: registry
    type: string
    default: 'https://registry.npmjs.org/'

steps:
  - bash: |
      npm set registry ${{ parameters.registry }}
      npm set //registry.npmjs.org/:_authToken $(NPM_TOKEN)
    displayName: 'Configure npm registry'

  - bash: |
      npm publish
    displayName: 'npm publish'
    env:
      NPM_TOKEN: $(NPM_TOKEN)
