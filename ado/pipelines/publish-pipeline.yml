trigger: none

resources:
  pipelines:
    - pipeline: mainCi
      source: main-pipeline
      trigger:
        branches:
          include:
            - main

pr: none

variables:
  NodeVersion: '20.x'
  # Recommended: store NPM_TOKEN as a secret variable in a variable group or pipeline variable
  # and map it to env.NPM_TOKEN in the publish step.

stages:
- stage: Publish
  displayName: Publish on version bump
  jobs:
  - job: DetectVersionBump
    pool:
      name: self-hosted-linux
    steps:
    - checkout: self
      fetchDepth: 0

    - template:  ./templates/install.yml
      parameters:
        nodeVersion: $(NodeVersion)

    # Determine whether this commit includes a version bump
    - bash: |
        set -euo pipefail
        echo "Checking for version bump in package.json..."
        # Compare current commit to previous commit on main
        git show --name-only --pretty="" HEAD > changed_files.txt
        cat changed_files.txt

        if grep -qx "package.json" changed_files.txt; then
          echo "package.json changed. Proceeding to validate version bump..."
        else
          echo "package.json did not change. Skipping publish."
          echo "##vso[task.setvariable variable=ShouldPublish;isOutput=true]false"
          exit 0
        fi

        # Optional: ensure version field changed (not just formatting)
        PREV="$(git show HEAD~1:package.json | node -p "JSON.parse(require('fs').readFileSync(0,'utf8')).version" )"
        CURR="$(cat package.json | node -p "JSON.parse(require('fs').readFileSync(0,'utf8')).version" )"
        echo "Prev version: $PREV"
        echo "Curr version: $CURR"

        if [ "$PREV" = "$CURR" ]; then
          echo "package.json changed but version did not change. Skipping publish."
          echo "##vso[task.setvariable variable=ShouldPublish;isOutput=true]false"
          exit 0
        fi

        echo "Version bump detected. Will publish."
        echo "##vso[task.setvariable variable=ShouldPublish;isOutput=true]true"
      name: VersionCheck
      displayName: Detect version bump

  - job: PublishPackage
    dependsOn: DetectVersionBump
    condition: eq(dependencies.DetectVersionBump.outputs['VersionCheck.ShouldPublish'], 'true')
    pool:
      name: self-hosted-linux
    steps:
    - checkout: self
      fetchDepth: 0

    - template:  ./templates/install.yml
      parameters:
        nodeVersion: $(NodeVersion)

    - template:  ./templates/ci.yml

    - template:  ./templates/test.yml

    - template:  ./templates/build.yml

    - template:  ./templates/publish.yml
      parameters:
        registry: 'https://registry.npmjs.org/'
        npmToken: $(NPM_TOKEN)